<!doctype html>
<html lang="zh-Hans">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>献予『开拓』之诗 | Three.js模拟翁法罗斯星系</title>
        <style>
            /* ================== 全局样式重置 ================== */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #000;
                overflow: hidden;
                /* 禁止页面滚动 */
                touch-action: none;
                /* 禁止默认触摸行为，防止移动端拖动页面 */
                position: fixed;
                width: 100%;
                height: 100%;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            }

            canvas {
                display: block;
                width: 100%;
                height: 100%;
            }

            /* ================== UI 信息层 ================== */
            .info {
                position: fixed;
                top: 20px;
                left: 20px;
                color: rgba(255, 255, 255, 0.6);
                font-family: "Microsoft YaHei", sans-serif;
                font-size: 14px;
                pointer-events: none;
                /* 确保不拦截鼠标/触摸事件至 Canvas */
                z-index: 100;
                user-select: none;
            }

            /* ================== Loading 加载遮罩层 ================== */
            .loader-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: #000510;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 9999;
                transition:
                    opacity 0.8 ease-in-out,
                    visibility 0.8;
            }

            .loader-overlay.hidden {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }

            /* CSS 动态背景：静态星空容器 */
            .stars-container {
                position: absolute;
                width: 100%;
                height: 100%;
                overflow: hidden;
            }

            .star {
                position: absolute;
                border-radius: 50%;
                animation: twinkle var(--duration) ease-in-out infinite alternate;
            }

            @keyframes twinkle {
                0% {
                    opacity: 0.2;
                    transform: scale(0.8);
                }

                100% {
                    opacity: 1;
                    transform: scale(1.2);
                    filter: brightness(1.5);
                }
            }

            /* CSS 动态背景：中央星系轨道动画 */
            .galaxy {
                position: relative;
                width: 200px;
                height: 200px;
                z-index: 10;
            }

            .orbit {
                position: absolute;
                border-radius: 50%;
                border: 1px solid transparent;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            .orbit-1 {
                width: 60px;
                height: 60px;
                border-color: rgba(170, 221, 255, 0.3);
                animation: spin 2 linear infinite;
            }

            .orbit-2 {
                width: 120px;
                height: 120px;
                border-color: rgba(255, 221, 170, 0.25);
                animation: spin 3 linear infinite reverse;
            }

            .orbit-3 {
                width: 180px;
                height: 180px;
                border-color: rgba(255, 255, 255, 0.15);
                animation: spin 4 linear infinite;
            }

            @keyframes spin {
                0% {
                    transform: translate(-50%, -50%) rotate(0deg);
                }

                100% {
                    transform: translate(-50%, -50%) rotate(360deg);
                }
            }

            .planet {
                position: absolute;
                border-radius: 50%;
                box-shadow:
                    0 0 15px currentColor,
                    0 0 30px currentColor,
                    0 0 60px currentColor;
            }

            .planet-1 {
                width: 10px;
                height: 10px;
                background: #aaddff;
                color: #aaddff;
                top: -5px;
                left: 50%;
                transform: translateX(-50%);
            }

            .planet-2 {
                width: 8px;
                height: 8px;
                background: #ffddaa;
                color: #ffddaa;
                top: -4px;
                left: 50%;
                transform: translateX(-50%);
            }

            .planet-3 {
                width: 6px;
                height: 6px;
                background: #ffffff;
                color: #ffffff;
                top: -3px;
                left: 50%;
                transform: translateX(-50%);
            }

            .sun {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 24px;
                height: 24px;
                border-radius: 50%;
                background: radial-gradient(
                    circle,
                    #ffffff 0%,
                    #aaddff 40%,
                    #ffddaa 70%,
                    transparent 100%
                );
                box-shadow:
                    0 0 20px #aaddff,
                    0 0 40px #ffddaa,
                    0 0 80px rgba(170, 221, 255, 0.5);
                animation: pulse 1.5 ease-in-out infinite alternate;
            }

            @keyframes pulse {
                0% {
                    transform: translate(-50%, -50%) scale(1);
                    opacity: 0.8;
                }

                100% {
                    transform: translate(-50%, -50%) scale(1.3);
                    opacity: 1;
                }
            }

            /* CSS 动态背景：流星效果 */
            .meteor {
                position: absolute;
                width: 100px;
                height: 2px;
                background: linear-gradient(90deg, transparent, #aaddff, #ffffff, transparent);
                border-radius: 50%;
                opacity: 0;
                animation: shoot var(--shoot-duration) linear infinite;
                animation-delay: var(--shoot-delay);
            }

            @keyframes shoot {
                0% {
                    transform: translateX(-100px) translateY(-100px) rotate(-45deg);
                    opacity: 0;
                }

                10% {
                    opacity: 1;
                }

                90% {
                    opacity: 1;
                }

                100% {
                    transform: translateX(400px) translateY(400px) rotate(-45deg);
                    opacity: 0;
                }
            }

            .loading-text {
                margin-top: 60px;
                color: #aaddff;
                font-size: 16px;
                letter-spacing: 8px;
                text-transform: uppercase;
                animation: textGlow 2 ease-in-out infinite alternate;
            }

            @keyframes textGlow {
                0% {
                    text-shadow:
                        0 0 5px #aaddff,
                        0 0 10px rgba(170, 221, 255, 0.5);
                    opacity: 0.6;
                }

                100% {
                    text-shadow:
                        0 0 10px #aaddff,
                        0 0 20px rgba(170, 221, 255, 0.8),
                        0 0 30px rgba(255, 221, 170, 0.4);
                    opacity: 1;
                }
            }

            /* CSS 动态背景：星云模糊效果 */
            .nebula {
                position: absolute;
                border-radius: 50%;
                filter: blur(60px);
                opacity: 0.15;
                animation: nebulaFloat 8s ease-in-out infinite alternate;
            }

            .nebula-1 {
                width: 300px;
                height: 300px;
                background: #aaddff;
                top: 20%;
                left: 20%;
            }

            .nebula-2 {
                width: 250px;
                height: 250px;
                background: #ffddaa;
                bottom: 20%;
                right: 20%;
                animation-delay: -4s;
            }

            @keyframes nebulaFloat {
                0% {
                    transform: translate(0, 0) scale(1);
                }

                100% {
                    transform: translate(30px, -30px) scale(1.1);
                }
            }
        </style>
        <!-- Three.js 模块导入映射配置 -->
        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
                }
            }
        </script>
    </head>

    <body>
        <!-- Loading 界面结构 -->
        <div class="loader-overlay" id="loader">
            <div class="nebula nebula-1"></div>
            <div class="nebula nebula-2"></div>
            <div class="stars-container" id="stars"></div>
            <div
                class="meteor"
                style="--shoot-duration: 3; --shoot-delay: 0; top: 10%; left: 10%"
            ></div>
            <div
                class="meteor"
                style="--shoot-duration: 4; --shoot-delay: 1.5; top: 30%; left: 60%"
            ></div>
            <div
                class="meteor"
                style="--shoot-duration: 3.5; --shoot-delay: 2; top: 50%; left: 20%"
            ></div>
            <div class="galaxy">
                <div class="sun"></div>
                <div class="orbit orbit-1">
                    <div class="planet planet-1"></div>
                </div>
                <div class="orbit orbit-2">
                    <div class="planet planet-2"></div>
                </div>
                <div class="orbit orbit-3">
                    <div class="planet planet-3"></div>
                </div>
            </div>
            <div class="loading-text">Loading Universe</div>
        </div>

        <div class="info">永恒之地 | 翁法罗斯 ♪</div>

        <script type="module">
            import * as THREE from "three";
            import { OrbitControls } from "three/addons/controls/OrbitControls.js";

            // ================== 1.核心配置与设备适配 ==================
            // 检测是否为移动设备，用于动态调整粒子数量以优化性能
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
                navigator.userAgent,
            );

            const CONFIG = {
                starCount: isMobile ? 8000 : 20000, // 背景星空粒子总数
                galaxyParticleCount: isMobile ? 10000 : 33550, // 中央星系螺旋粒子总数
                galaxySpeed: 0.1, // 星系旋转速度系数
                galaxyTubeWidth: 150, // 星系螺旋管道的径向宽度
                bgRadiusMin: 2000, // 背景星空最小半径
                bgRadiusMax: 5000, // 背景星空最大半径
                pixelRatioLimit: isMobile ? 1 : 2, // 限制最大像素比，防止高分屏过热
                colors: {
                    background: 0x000510, // 深空背景色
                    star1: 0xaaddff,
                    star2: 0xffddaa,
                    star3: 0xffffff, // 星星颜色 palette
                    galaxy: [0x46e8ff, 0xd946ff, 0xffe633], // 星系渐变色：蓝->紫->黄
                },
                galaxyShape: { x_A: 1000, y_A: 400, z_A: 100 }, //星系形状振幅参数 (X, Y, Z轴)
            };

            // ================== 2. Shader 着色器定义 (GLSL) ==================

            /**
             * [Fragment Shader] 通用片元着色器
             * 功能：实现粒子的径向辉光衰减及十字星芒特效
             * 原理：
             * 1. 利用 gl_PointCoord 计算像素到粒子中心的距离。
             * 2. 使用 smoothstep 实现柔和的边缘截止。
             * 3. 通过坐标绝对值模拟十字交叉高光，增强视觉冲击力。
             */
            const commonFragmentShader = `
            varying vec3 vColor;      // 接收顶点着色器传入的颜色
            varying float vAlpha;     // 接收顶点着色器传入的基础透明度（用于闪烁控制）
            
            void main() {
                // 计算当前片段相对于粒子中心 (0.5, 0.5) 的偏移量
                vec2 coord = gl_PointCoord - vec2(0.5);
                float dist = length(coord); 
                
                // 圆形裁剪：超出半径0.5的像素直接丢弃
                if (dist > 0.5) discard;
                
                // 径向辉光：中心最亮，向边缘线性衰减
                float glow = 1.0 - smoothstep(0.0, 0.5, dist);
                
                // 十字星芒算法：
                // 当 x 或 y 坐标接近 0 时产生高亮，模拟十字星光
                float crossWidth = 0.02; 
                float xMask = 1.0 - smoothstep(crossWidth * 0.5, crossWidth * 1.5, abs(coord.x));
                float yMask = 1.0 - smoothstep(crossWidth * 0.5, crossWidth * 1.5, abs(coord.y));
                // 星芒强度随距离中心越远而减弱，避免溢出粒子边界
                float crossGlow = max(xMask, yMask) * 0.3 * (1.0 - dist * 2.0);
                
                // 合成最终颜色：基础色 + 星芒白色高光
                // 合成最终透明度：(辉光 + 星芒) * 顶点传入的闪烁系数
                float finalAlpha = (glow * 0.8 + crossGlow) * vAlpha;
                gl_FragColor = vec4(vColor + vec3(crossGlow), finalAlpha);
            }
        `;

            /**
             * [Vertex Shader] 背景星空顶点着色器
             * 功能：处理背景恒星的位置投影、大小透视衰减及随机闪烁逻辑
             */
            const starfieldVertexShader = `
            attribute float size;     // 粒子基础尺寸
            attribute vec3 color;     // 粒子基础颜色
            attribute float phase;    // 随机相位，用于错开每颗星的闪烁时间
            uniform float uTime;      // 全局运行时间
            uniform float uPixelRatio;// 设备像素比修正
            
            varying vec3 vColor;
            varying float vAlpha;
            
            void main() {
                vColor = color;
                // 闪烁逻辑：正弦波调制，基准亮度0.6，振幅0.4
                float twinkle = 0.6 + 0.4 * sin(uTime * 3.0 + phase);
                vAlpha = twinkle;
                
                // 模型视图变换：将世界坐标转换为相机视角坐标
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                float depth = max(-mvPosition.z, 1.0); // 获取深度值，防止除零
                
                // 透视投影大小计算：
                // 尺寸 = 基础尺寸 * (常数 / 深度) * 像素比
                // 600.0 为视觉缩放系数，确保星星在远处依然可见
                gl_PointSize = size * (600.0 / depth) * uPixelRatio;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

            /**
             * [Vertex Shader] 中央星系顶点着色器
             * 功能：基于三角函数参数方程生成动态螺旋轨道运动
             * 原理：
             * 1. 利用 initialT 作为初始角度，结合 uTime 产生旋转动画。
             * 2. 通过 offset 属性在螺旋线法线方向产生随机偏移，形成“管道”状星系结构。
             * 3. 不同轴向使用不同频率的正弦/余弦函数，构建复杂的三维扭曲形态。
             */
            const galaxyVertexShader = `
            attribute float size;
            attribute vec3 color;
            attribute float initialT; // 粒子在螺旋线上的初始角度参数
            attribute float offset;   // 粒子相对于螺旋中心线的径向偏移量
            
            uniform float uTime;
            uniform float uSpeed;
            uniform float uPixelRatio;
            uniform float uXA;        // X轴形状振幅
            uniform float uYA;        // Y轴形状振幅
            uniform float uZA;        // Z轴形状振幅
            
            varying vec3 vColor;
            varying float vAlpha;
            
            void main() {
                vColor = color;
                vAlpha = 1.0; 
                
                // 时间演化：当前角度 = 初始角度 + 速度 * 时间
                float t = initialT + uTime * uSpeed;
                
                // 参数方程计算三维空间位置：
                // 主螺旋运动 + 径向偏移扰动
                float x = uXA * sin(t) + offset * cos(t);
                float y = uYA * sin(t * 2.0) + offset * sin(t);
                float z = uZA * cos(t) + offset * sin(t);
                
                vec4 mvPosition = modelViewMatrix * vec4(x, y, z, 1.0);
                float depth = max(-mvPosition.z, 1.0);
                
                // 星系粒子尺寸计算：
                // 2000.0 为特定缩放系数，使星系在视觉上更宏大且具备景深感
                gl_PointSize = size * (2000.0 / depth) * uPixelRatio;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

            /**
             * [Vertex Shader] 中心恒星顶点着色器
             * 功能：渲染稳定、巨大且不发闪烁的核心光源
             */
            const coreStarVertexShader = `
            attribute float size;
            uniform float uPixelRatio;
            varying vec3 vColor;
            varying float vAlpha;
            
            void main() {
                vColor = vec3(0.6, 0.7, 0.8); // 恒星光色：淡蓝白
                vAlpha = 1.0; 
                
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                float depth = max(-mvPosition.z, 1.0);
                
                // 核心恒星尺寸极大且不随时间变化，40.0 为放大系数
                gl_PointSize = size * 40.0 * uPixelRatio;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

            // ================== 3. Three.js 场景初始化引擎 ==================

            // 创建场景并设置深空背景色
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(CONFIG.colors.background);
            // 非移动端启用指数雾效，增强空间深邃感
            if (!isMobile) scene.fog = new THREE.FogExp2(CONFIG.colors.background, 0.0005);

            // 创建透视相机
            const camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                10000,
            );
            camera.position.set(0, 0, 4000); // 初始相机位置

            // 创建 WebGL 渲染器
            const renderer = new THREE.WebGLRenderer({
                antialias: !isMobile,
                alpha: false,
                powerPreference: "high-performance",
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            // 限制像素比以平衡画质与性能
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, CONFIG.pixelRatioLimit));
            document.body.appendChild(renderer.domElement);

            // 添加轨道控制器，允许用户旋转、缩放视角
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // 启用阻尼惯性
            controls.dampingFactor = 0.05;
            controls.minDistance = 10;
            controls.maxDistance = 5000;
            // 移动端优化：禁用平移，降低旋转/缩放灵敏度
            if (isMobile) {
                controls.enablePan = false;
                controls.rotateSpeed = 0.5;
                controls.zoomSpeed = 0.5;
            }

            // ================== 4. 几何体构建工厂 ==================

            /**
             * 创建背景星空粒子系统
             * 算法：使用球坐标系均匀分布粒子，并赋予随机颜色、大小和闪烁相位
             */
            function createStarfield() {
                const geometry = new THREE.BufferGeometry();
                const count = CONFIG.starCount;
                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);
                const sizes = new Float32Array(count);
                const phases = new Float32Array(count);

                // 预定义颜色对象
                const c1 = new THREE.Color(CONFIG.colors.star1);
                const c2 = new THREE.Color(CONFIG.colors.star2);
                const c3 = new THREE.Color(CONFIG.colors.star3);

                for (let i = 0; i < count; i++) {
                    // 球坐标随机采样算法，确保粒子在球壳内均匀分布
                    const u = Math.random(),
                        v = Math.random();
                    const theta = 2 * Math.PI * u,
                        phi = Math.acos(2 * v - 1);
                    const radius =
                        CONFIG.bgRadiusMin +
                        Math.random() * (CONFIG.bgRadiusMax - CONFIG.bgRadiusMin);

                    // 转换为笛卡尔坐标
                    positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                    positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                    positions[i * 3 + 2] = radius * Math.cos(phi);

                    // 随机分配三种预设颜色之一，并加入轻微亮度变化
                    let c = c3;
                    if (Math.random() < 0.33) c = c1;
                    else if (Math.random() < 0.66) c = c2;
                    const variation = 0.8 + Math.random() * 0.4;
                    colors[i * 3] = c.r * variation;
                    colors[i * 3 + 1] = c.g * variation;
                    colors[i * 3 + 2] = c.b * variation;

                    // 距离越远的星星视觉上越小，增强景深
                    const distRatio =
                        (radius - CONFIG.bgRadiusMin) / (CONFIG.bgRadiusMax - CONFIG.bgRadiusMin);
                    sizes[i] = (10.0 + Math.random() * 20.0) * (1 - distRatio * 0.8);

                    // 随机闪烁相位
                    phases[i] = Math.random() * Math.PI * 2;
                }

                // 绑定 Buffer 属性
                geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
                geometry.setAttribute("size", new THREE.BufferAttribute(sizes, 1));
                geometry.setAttribute("phase", new THREE.BufferAttribute(phases, 1));

                // 创建 Points 对象并应用自定义 ShaderMaterial
                return new THREE.Points(
                    geometry,
                    new THREE.ShaderMaterial({
                        uniforms: {
                            uPixelRatio: { value: renderer.getPixelRatio() },
                            uTime: { value: 0 },
                        },
                        vertexShader: starfieldVertexShader,
                        fragmentShader: commonFragmentShader,
                        transparent: true,
                        blending: THREE.AdditiveBlending, // 加法混合模式，实现发光叠加效果
                        depthWrite: false, // 关闭深度写入，防止粒子相互遮挡产生黑边
                    }),
                );
            }

            /**
             * 创建中央螺旋星系粒子系统
             * 算法：基于参数方程生成螺旋线，并在法线方向添加随机偏移形成体积感
             */
            function createStarCenter() {
                const geometry = new THREE.BufferGeometry();
                const count = CONFIG.galaxyParticleCount;
                const positions = new Float32Array(count * 3);
                const initialTArray = new Float32Array(count);
                const particleSizes = new Float32Array(count);
                const particleColors = new Float32Array(count * 3);
                const offsets = new Float32Array(count);

                // 预计算星系渐变颜色
                const galaxyColors = CONFIG.colors.galaxy.map((c) => new THREE.Color(c));

                for (let i = 0; i < count; ++i) {
                    // 归一化角度 t: 0 -> 2PI
                    const t = (i / count) * Math.PI * 2;
                    initialTArray[i] = t;

                    // 径向偏移：使粒子分布在螺旋线周围，形成“管道”而非单一线条
                    offsets[i] = (Math.random() - 0.5) * CONFIG.galaxyTubeWidth;

                    // 根据参数方程计算位置
                    const x = CONFIG.galaxyShape.x_A * Math.sin(t) + offsets[i] * Math.cos(t);
                    const y = CONFIG.galaxyShape.y_A * Math.sin(t * 2) + offsets[i] * Math.sin(t);
                    const z = CONFIG.galaxyShape.z_A * Math.cos(t) + offsets[i] * Math.sin(t);

                    positions[i * 3] = x;
                    positions[i * 3 + 1] = y;
                    positions[i * 3 + 2] = z;

                    // 随机粒子大小
                    particleSizes[i] = 0.4 + Math.random() * 1.0;

                    // 根据角度 t 在三种颜色之间进行线性插值 (Lerp)，形成彩虹渐变
                    const norm = t / (Math.PI * 2);
                    const p = (norm * 3) % 3;
                    let c;
                    if (p < 1) c = galaxyColors[0].clone().lerp(galaxyColors[1], p);
                    else if (p < 2) c = galaxyColors[1].clone().lerp(galaxyColors[2], p - 1);
                    else c = galaxyColors[2].clone().lerp(galaxyColors[0], p - 2);

                    particleColors[i * 3] = c.r;
                    particleColors[i * 3 + 1] = c.g;
                    particleColors[i * 3 + 2] = c.b;
                }

                geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute("initialT", new THREE.BufferAttribute(initialTArray, 1));
                geometry.setAttribute("offset", new THREE.BufferAttribute(offsets, 1));
                geometry.setAttribute("size", new THREE.BufferAttribute(particleSizes, 1));
                geometry.setAttribute("color", new THREE.BufferAttribute(particleColors, 3));

                return new THREE.Points(
                    geometry,
                    new THREE.ShaderMaterial({
                        uniforms: {
                            uTime: { value: 0 },
                            uSpeed: { value: CONFIG.galaxySpeed },
                            uPixelRatio: { value: renderer.getPixelRatio() },
                            uXA: { value: CONFIG.galaxyShape.x_A },
                            uYA: { value: CONFIG.galaxyShape.y_A },
                            uZA: { value: CONFIG.galaxyShape.z_A },
                        },
                        vertexShader: galaxyVertexShader,
                        fragmentShader: commonFragmentShader,
                        transparent: true,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false,
                    }),
                );
            }

            /**
             * 创建中心恒星星核
             * 描述：位于原点的单个巨大发光点，作为星系的引力中心
             */
            function createCoreStar() {
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute(
                    "position",
                    new THREE.BufferAttribute(new Float32Array([0, 0, 0]), 3),
                );
                geometry.setAttribute(
                    "size",
                    new THREE.BufferAttribute(new Float32Array([1.0]), 1),
                );

                return new THREE.Points(
                    geometry,
                    new THREE.ShaderMaterial({
                        uniforms: { uPixelRatio: { value: renderer.getPixelRatio() } },
                        vertexShader: coreStarVertexShader,
                        fragmentShader: commonFragmentShader,
                        transparent: true,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false,
                        depthTest: true, // 核心恒星需要参与深度测试，以便被前景物体遮挡
                    }),
                );
            }

            // 将所有生成的粒子系统添加到场景中
            scene.add(createStarfield());
            scene.add(createStarCenter());
            scene.add(createCoreStar());

            // ================== 5. 渲染循环与状态管理 ==================
            const clock = new THREE.Clock();
            let isPaused = false;

            function animate() {
                // 页面隐藏或暂停时停止渲染以节省资源
                if (document.hidden || isPaused) return;

                const elapsedTime = clock.getElapsedTime();

                // 更新所有 Shader 中的时间 Uniforms，驱动动画
                scene.children.forEach((child) => {
                    if (child.material && child.material.uniforms.uTime) {
                        child.material.uniforms.uTime.value = elapsedTime;
                    }
                });

                // 背景星空整体缓慢自旋，增加动态感
                if (scene.children[0]) {
                    scene.children[0].rotation.x -= 0.0002;
                    scene.children[0].rotation.y += 0.0002;
                    scene.children[0].rotation.z += 0.0002;
                }

                controls.update();
                renderer.render(scene, camera);

                // 首帧渲染完成后触发 Loading 销毁流程
                if (!finishLoadingCalled) finishLoading();
            }

            // 使用 setAnimationLoop 替代 requestAnimationFrame，兼容 VR/AR 设备
            renderer.setAnimationLoop(animate);

            // ================== 6. Loading 生命周期控制 ==================
            const MIN_LOAD_TIME = 2000; // 最小加载展示时间，避免闪屏
            const loadStart = performance.now();
            let loadingFinished = false,
                finishLoadingCalled = false;

            function finishLoading() {
                if (finishLoadingCalled) return;
                finishLoadingCalled = true;

                // 计算剩余需要等待的时间
                const remain = Math.max(0, MIN_LOAD_TIME - (performance.now() - loadStart));

                setTimeout(() => {
                    const loader = document.getElementById("loader");
                    if (loader) {
                        loader.classList.add("hidden");
                        // 动画结束后从 DOM 中移除元素
                        setTimeout(() => {
                            if (loader.parentNode) loader.parentNode.removeChild(loader);
                        }, 800);
                    }
                    loadingFinished = true;
                }, remain);
            }

            // 超时保护：如果10秒未加载完成，显示错误提示
            setTimeout(() => {
                if (!loadingFinished) {
                    const loader = document.getElementById("loader");
                    if (loader && !loader.classList.contains("hidden")) {
                        loader.innerHTML =
                            '<div style="color:#aaddff;font-size:16px;text-align:center;padding-top:45vh;">加载超时，请刷新页面重试</div>';
                    }
                }
            }, 10000);

            // 全局错误捕获
            window.addEventListener(
                "error",
                () => {
                    const loader = document.getElementById("loader");
                    if (loader && !loadingFinished) {
                        loader.innerHTML =
                            '<div style="color:#ff6b6b;font-size:16px;text-align:center;padding-top:45vh;">渲染出错，请刷新页面</div>';
                    }
                },
                { once: true },
            );

            // 动态生成 CSS Loading 背景中的静态星星
            const starsContainer = document.getElementById("stars");
            for (let i = 0; i < 150; i++) {
                const star = document.createElement("div");
                star.className = "star";
                const size = Math.random() * 2.5 + 0.5;
                star.style.cssText = `
            width:${size}px;
            height:${size}px;
            left:${Math.random() * 100}%;
            top:${Math.random() * 100}%;
            background:${["#aaddff", "#ffddaa", "#ffffff"][Math.floor(Math.random() * 3)]};
            box-shadow:0 0 ${size * 2}px currentColor;--duration:${Math.random() * 2 + 1}s;
            animation-delay:${Math.random() * 3}s;
            `;
                starsContainer.appendChild(star);
            }

            // 页面可见性监听：切换标签页时暂停/恢复渲染
            document.addEventListener("visibilitychange", () => {
                isPaused = document.hidden;
                if (!isPaused) clock.start();
            });

            // 窗口 resize 监听：自适应屏幕尺寸
            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);

                // 更新像素比并同步至所有 Shader
                const pr = Math.min(window.devicePixelRatio, CONFIG.pixelRatioLimit);
                renderer.setPixelRatio(pr);
                scene.children.forEach((child) => {
                    if (child.material && child.material.uniforms.uPixelRatio) {
                        child.material.uniforms.uPixelRatio.value = pr;
                    }
                });
            });
        </script>
    </body>
</html>
